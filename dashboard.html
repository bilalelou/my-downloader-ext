<!doctype html>
<html dir="ltr" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilal Downloader Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== Base Dashboard Design ===== */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #09090e 0%, #15152a 100%);
      color: #e0e0e0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
    }

    .container {
      width: 100%; max-width: 900px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      padding: 30px;
    }

    h1 {
      font-size: 28px; font-weight: 800; margin-bottom: 20px;
      background: linear-gradient(135deg, #818cf8, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }

    /* ===== Status Header ===== */
    .status-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .stats {
      display: flex; gap: 15px; font-size: 14px; color: #94a3b8;
    }
    .stat-badge {
      background: rgba(255, 255, 255, 0.05); padding: 6px 14px;
      border-radius: 30px; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* ===== Grid ===== */
    .downloads-grid {
      display: grid; grid-template-columns: 1fr; gap: 16px;
    }

    .download-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px; padding: 20px;
      display: flex; justify-content: space-between; align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .download-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.06);
    }

    .info-section { flex: 1; margin-right: 20px; overflow: hidden; }
    
    .title-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .dp-title {
      font-size: 16px; font-weight: 600; color: #f8fafc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px;
    }
    
    .tag {
      font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    }
    .tag-quality { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2); }
    .tag-playlist { background: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.2); }

    .meta-row {
      font-size: 12px; color: #94a3b8; display: flex; gap: 15px; margin-bottom: 8px;
    }

    .progress-text {
      font-size: 12px; font-family: monospace; color: #818cf8; margin-bottom: 6px;
    }

    .status-badge {
      font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 8px;
      text-transform: capitalize; width: 110px; text-align: center; border: 1px solid transparent; flex-shrink: 0;
    }
    .s-downloading { background: rgba(99, 102, 241, 0.1); color: #a5b4fc; border-color: rgba(99, 102, 241, 0.3); animation: pulseGlow 2s infinite; }
    .s-completed { background: rgba(34, 197, 94, 0.1); color: #86efac; border-color: rgba(34, 197, 94, 0.3); }
    .s-pending { background: rgba(255, 255, 255, 0.05); color: #cbd5e1; border-color: rgba(255, 255, 255, 0.1); }
    .s-cancelled { background: rgba(100, 116, 139, 0.1); color: #94a3b8; border-color: rgba(100, 116, 139, 0.3); }
    .s-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
    .s-retrying { background: rgba(234, 179, 8, 0.1); color: #fde047; border-color: rgba(234, 179, 8, 0.3); }

    .action-btn {
      background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all 0.2s; margin-left: 10px; flex-shrink: 0;
    }
    .action-btn:hover { background: rgba(239, 68, 68, 0.2); }

    .err-text { font-size: 11px; color: #fca5a5; margin-top: 6px; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.2); }
      50% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }
    }

    #emptyState {
      text-align: center; padding: 40px; color: #64748b; font-size: 15px; display: none;
    }
    
    .server-alert {
      background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5; padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 20px;
      font-weight: 600; display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bilal Downloader Dashboard 🚀</h1>
    <div id="serverAlert" class="server-alert">🔴 Server is offline. Please run start_server.bat!</div>
    
    <div class="status-header">
      <div class="stats">
        <div class="stat-badge" id="statActive">Active: 0</div>
        <div class="stat-badge" id="statPending">Pending: 0</div>
        <div class="stat-badge" id="statDone">Completed: 0</div>
      </div>
    </div>

    <div id="emptyState">No downloads yet. Send some from the extension!</div>
    <div class="downloads-grid" id="grid"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
